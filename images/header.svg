<svg xmlns="http://www.w3.org/2000/svg" width="800" height="160" viewBox="0 0 800 160">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2e0057"/>
      <stop offset="50%" stop-color="#4c1d95"/>
      <stop offset="100%" stop-color="#1a0036"/>
    </linearGradient>
    <linearGradient id="dripGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#5b21b6"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="110" fill="url(#bgGrad)"/>

  <!-- Subtle shimmer overlay that pulses -->
  <rect width="800" height="110" fill="#a78bfa" opacity="0">
    <animate attributeName="opacity"
      values="0;0.08;0;0.05;0"
      dur="4s" repeatCount="indefinite"/>
  </rect>

  <!-- Title text — fades and rises in -->
  <text x="400" y="54" text-anchor="middle"
    font-family="Segoe UI, Arial, sans-serif"
    font-size="34" font-weight="700" letter-spacing="8"
    fill="#ffffff" opacity="0">
    Err0ric
    <animate attributeName="opacity" values="0;1" dur="1.2s" fill="freeze"/>
    <animateTransform attributeName="transform" type="translate"
      values="0 8;0 0" dur="1.2s" fill="freeze"/>
  </text>

  <!-- Subtitle — fades in after title -->
  <text x="400" y="82" text-anchor="middle"
    font-family="Segoe UI, Arial, sans-serif"
    font-size="12" letter-spacing="2.5"
    fill="#c4b5fd" opacity="0">
    Information Security  ·  OSINT  ·  Always Building
    <animate attributeName="opacity" values="0;0;1" dur="2s" fill="freeze"/>
  </text>

  <!-- Drip base bar -->
  <rect x="0" y="95" width="800" height="16" fill="url(#dripGrad)"/>

  <!-- Drip 1 -->
  <ellipse cx="60" cy="128" rx="14" ry="0" fill="#7c3aed">
    <animate attributeName="ry" values="0;20" dur="0.6s" begin="0.3s" fill="freeze"/>
  </ellipse>
  <rect x="46" y="100" width="28" height="0" fill="#7c3aed">
    <animate attributeName="height" values="0;28" dur="0.6s" begin="0.3s" fill="freeze"/>
  </rect>

  <!-- Drip 2 -->
  <ellipse cx="140" cy="140" rx="9" ry="0" fill="#6d28d9">
    <animate attributeName="ry" values="0;16" dur="0.5s" begin="0.5s" fill="freeze"/>
  </ellipse>
  <rect x="131" y="100" width="18" height="0" fill="#6d28d9">
    <animate attributeName="height" values="0;40" dur="0.5s" begin="0.5s" fill="freeze"/>
  </rect>

  <!-- Drip 3 -->
  <ellipse cx="220" cy="120" rx="18" ry="0" fill="#7c3aed">
    <animate attributeName="ry" values="0;12" dur="0.4s" begin="0.2s" fill="freeze"/>
  </ellipse>
  <rect x="202" y="100" width="36" height="0" fill="#7c3aed">
    <animate attributeName="height" values="0;20" dur="0.4s" begin="0.2s" fill="freeze"/>
  </rect>

  <!-- Drip 4 -->
  <ellipse cx="310" cy="134" rx="11" ry="0" fill="#5b21b6">
    <animate attributeName="ry" values="0;18" dur="0.7s" begin="0.4s" fill="freeze"/>
  </ellipse>
  <rect x="299" y="100" width="22" height="0" fill="#5b21b6">
    <animate attributeName="height" values="0;34" dur="0.7s" begin="0.4s" fill="freeze"/>
  </rect>

  <!-- Drip 5 small -->
  <ellipse cx="375" cy="116" rx="7" ry="0" fill="#7c3aed">
    <animate attributeName="ry" values="0;10" dur="0.35s" begin="0.6s" fill="freeze"/>
  </ellipse>
  <rect x="368" y="100" width="14" height="0" fill="#7c3aed">
    <animate attributeName="height" values="0;16" dur="0.35s" begin="0.6s" fill="freeze"/>
  </rect>

  <!-- Drip 6 large -->
  <ellipse cx="450" cy="144" rx="16" ry="0" fill="#6d28d9">
    <animate attributeName="ry" values="0;22" dur="0.8s" begin="0.15s" fill="freeze"/>
  </ellipse>
  <rect x="434" y="100" width="32" height="0" fill="#6d28d9">
    <animate attributeName="height" values="0;44" dur="0.8s" begin="0.15s" fill="freeze"/>
  </rect>

  <!-- Drip 7 -->
  <ellipse cx="530" cy="128" rx="12" ry="0" fill="#7c3aed">
    <animate attributeName="ry" values="0;16" dur="0.55s" begin="0.35s" fill="freeze"/>
  </ellipse>
  <rect x="518" y="100" width="24" height="0" fill="#7c3aed">
    <animate attributeName="height" values="0;28" dur="0.55s" begin="0.35s" fill="freeze"/>
  </rect>

  <!-- Drip 8 thin tall -->
  <ellipse cx="600" cy="140" rx="8" ry="0" fill="#5b21b6">
    <animate attributeName="ry" values="0;14" dur="0.65s" begin="0.5s" fill="freeze"/>
  </ellipse>
  <rect x="592" y="100" width="16" height="0" fill="#5b21b6">
    <animate attributeName="height" values="0;40" dur="0.65s" begin="0.5s" fill="freeze"/>
  </rect>

  <!-- Drip 9 -->
  <ellipse cx="665" cy="122" rx="13" ry="0" fill="#7c3aed">
    <animate attributeName="ry" values="0;15" dur="0.45s" begin="0.25s" fill="freeze"/>
  </ellipse>
  <rect x="652" y="100" width="26" height="0" fill="#7c3aed">
    <animate attributeName="height" values="0;22" dur="0.45s" begin="0.25s" fill="freeze"/>
  </rect>

  <!-- Drip 10 small -->
  <ellipse cx="722" cy="114" rx="6" ry="0" fill="#6d28d9">
    <animate attributeName="ry" values="0;9" dur="0.3s" begin="0.55s" fill="freeze"/>
  </ellipse>
  <rect x="716" y="100" width="12" height="0" fill="#6d28d9">
    <animate attributeName="height" values="0;14" dur="0.3s" begin="0.55s" fill="freeze"/>
  </rect>

  <!-- Drip 11 -->
  <ellipse cx="768" cy="132" rx="10" ry="0" fill="#7c3aed">
    <animate attributeName="ry" values="0;17" dur="0.6s" begin="0.45s" fill="freeze"/>
  </ellipse>
  <rect x="758" y="100" width="20" height="0" fill="#7c3aed">
    <animate attributeName="height" values="0;32" dur="0.6s" begin="0.45s" fill="freeze"/>
  </rect>

  <!-- Detached falling dots -->
  <circle cx="108" cy="152" r="4" fill="#7c3aed" opacity="0.7"/>
  <circle cx="340" cy="149" r="3" fill="#a78bfa" opacity="0.6"/>
  <circle cx="480" cy="156" r="5" fill="#6d28d9" opacity="0.7"/>
  <circle cx="618" cy="150" r="3" fill="#a78bfa" opacity="0.5"/>
  <circle cx="742" cy="146" r="4" fill="#7c3aed" opacity="0.6"/>
</svg>
