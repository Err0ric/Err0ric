<svg xmlns="http://www.w3.org/2000/svg" width="800" height="160" viewBox="0 0 800 160">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2e0057"/>
      <stop offset="50%" stop-color="#4c1d95"/>
      <stop offset="100%" stop-color="#1a0036"/>
    </linearGradient>
    <linearGradient id="dripGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#5b21b6"/>
    </linearGradient>
    <style>
      .title {
        font-family: 'Segoe UI', Arial, sans-serif;
        font-size: 32px;
        font-weight: 700;
        letter-spacing: 8px;
        fill: #ffffff;
        animation: fadeIn 1.4s ease-out forwards;
        opacity: 0;
      }
      .sub {
        font-family: 'Segoe UI', Arial, sans-serif;
        font-size: 12px;
        letter-spacing: 2px;
        fill: #c4b5fd;
        animation: fadeIn 1.4s ease-out 0.7s forwards;
        opacity: 0;
      }
      @keyframes fadeIn {
        from { opacity: 0; transform: translateY(-6px); }
        to   { opacity: 1; transform: translateY(0); }
      }
    </style>
  </defs>

  <!-- Background block -->
  <rect width="800" height="110" fill="url(#bgGrad)"/>

  <!-- Text -->
  <text class="title" x="400" y="58" text-anchor="middle">Err0ric</text>
  <text class="sub"   x="400" y="88" text-anchor="middle">Information Security  ·  OSINT  ·  Always Building</text>

  <!-- Drip layer — purple shapes hanging from bottom of header block -->
  <g fill="url(#dripGrad)">
    <!-- Base fill connecting all drips -->
    <rect x="0" y="95" width="800" height="18"/>

    <!-- Drip 1 -->
    <ellipse cx="60" cy="122" rx="14" ry="20"/>
    <rect x="46" y="100" width="28" height="22"/>

    <!-- Drip 2 - tall thin -->
    <ellipse cx="130" cy="136" rx="9" ry="16"/>
    <rect x="121" y="100" width="18" height="36"/>

    <!-- Drip 3 - wide short -->
    <ellipse cx="210" cy="118" rx="18" ry="12"/>
    <rect x="192" y="100" width="36" height="18"/>

    <!-- Drip 4 -->
    <ellipse cx="295" cy="130" rx="11" ry="18"/>
    <rect x="284" y="100" width="22" height="30"/>

    <!-- Drip 5 - small -->
    <ellipse cx="360" cy="114" rx="7" ry="10"/>
    <rect x="353" y="100" width="14" height="14"/>

    <!-- Drip 6 - large -->
    <ellipse cx="440" cy="140" rx="16" ry="22"/>
    <rect x="424" y="100" width="32" height="40"/>

    <!-- Drip 7 -->
    <ellipse cx="520" cy="125" rx="12" ry="16"/>
    <rect x="508" y="100" width="24" height="25"/>

    <!-- Drip 8 - thin tall -->
    <ellipse cx="590" cy="138" rx="8" ry="14"/>
    <rect x="582" y="100" width="16" height="38"/>

    <!-- Drip 9 -->
    <ellipse cx="655" cy="120" rx="13" ry="15"/>
    <rect x="642" y="100" width="26" height="20"/>

    <!-- Drip 10 - small -->
    <ellipse cx="715" cy="112" rx="6" ry="9"/>
    <rect x="709" y="100" width="12" height="12"/>

    <!-- Drip 11 -->
    <ellipse cx="762" cy="130" rx="10" ry="17"/>
    <rect x="752" y="100" width="20" height="30"/>
  </g>

  <!-- Detached falling drops -->
  <circle cx="108" cy="152" r="4" fill="#7c3aed" opacity="0.7"/>
  <circle cx="340" cy="148" r="3" fill="#a78bfa" opacity="0.6"/>
  <circle cx="475" cy="156" r="5" fill="#6d28d9" opacity="0.7"/>
  <circle cx="620" cy="150" r="3" fill="#a78bfa" opacity="0.5"/>
  <circle cx="740" cy="145" r="4" fill="#7c3aed" opacity="0.6"/>
</svg>
